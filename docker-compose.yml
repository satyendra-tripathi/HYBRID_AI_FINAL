version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: ai-ids-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ai-ids
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - ai-ids-network
    healthcheck:
      test: echo 'db.adminCommand("ping")' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Python FastAPI AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-ids-ai-service
    ports:
      - "8000:8000"
    environment:
      FASTAPI_HOST: 0.0.0.0
      FASTAPI_PORT: 8000
    volumes:
      - ./ai-service:/app
      - ./ai-service/models:/app/models
    networks:
      - ai-ids-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mongodb:
        condition: service_healthy

  # Node.js Express Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-ids-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/ai-ids?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGIN: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000,http://frontend:3000
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    networks:
      - ai-ids-network
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-ids-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_AI_SERVICE_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - ai-ids-network
    depends_on:
      - backend

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  ai-ids-network:
    driver: bridge
